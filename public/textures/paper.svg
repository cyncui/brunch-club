<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
  <filter id="paper" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
    <!-- Soft mottled foxing stains (no fine grit — the covers already carry grain). -->
    <feTurbulence type="fractalNoise" baseFrequency="0.010 0.014" numOctaves="4" seed="17" stitchTiles="stitch" result="blotch"/>
    <feColorMatrix in="blotch" type="matrix"
      values="0 0 0 0 0.24
              0 0 0 0 0.17
              0 0 0 0 0.10
              0.45 0.45 0.45 0 0" result="foxing"/>
    <feComponentTransfer in="foxing">
      <feFuncA type="gamma" amplitude="1" exponent="3.2" offset="0"/>
    </feComponentTransfer>
  </filter>
  <rect width="520" height="520" filter="url(#paper)"/>
</svg>
